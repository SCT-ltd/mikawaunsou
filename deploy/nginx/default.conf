# 三川運送システム — 2つの公開ホストを1つの nginx で捌く
#
#   admin.mikawa-unso.jp … 管理画面（全機能）。Cloudflare Access の背後に置く。
#   mikawa-unso.jp       … QR打刻の公開ホスト。Access を掛けない（ドライバーが弾かれるため）。
#
# ホスト名は server_name のパターンで判定しており、ドメインをハードコードしていない:
#   - "admin." で始まる Host → 管理ホスト
#   - それ以外の Host        → 公開ホスト（default_server）
# nginx にはポートを公開しておらず、到達できるのは cloudflared だけなので、
# Cloudflare 側で設定した2ホスト以外はそもそも届かない。

# ─────────────────────────────────────────────────────────
# 公開ホスト: QR打刻だけを出す。管理画面と管理APIは一切到達させない。
# ─────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    resolver 127.0.0.11 valid=10s ipv6=off;
    client_max_body_size 2m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;
    add_header Referrer-Policy        "same-origin" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # ── 公開APIの allowlist ────────────────────────────────
    # api-server の isPublicDriverFlowRequest()（routes/index.ts）が
    # 「ログイン不要」と認めているエンドポイントだけをここに通す。
    # 加えて /api/auth/me は AuthProvider が全ルートで呼ぶため許可する（未ログインなら 401 が返るだけ）。
    #
    # !!! routes/index.ts の公開エンドポイントを増減したら、この正規表現も必ず合わせること !!!
    #     ここに無いパスは 403 になり、QR画面が無言で壊れる。
    #
    # メソッドの区別はしない（Express 側が method と権限を最終判定する）。
    location ~ ^/api/(auth/me|employees/[0-9]+(/pin/(status|verify))?|attendance/(record|location/live|stream|employee/[0-9]+/(today|month)|checklist/[0-9]+|draft/[0-9]+)|messages(/stream|/vapid-public-key|/[0-9]+(/unread-count|/read)?)?|push/subscribe)$ {
        include /etc/nginx/mikawa-proxy.conf;
    }

    # 上記以外のAPI（/api/auth/login、/api/payroll、/api/employees 一覧 など）は
    # 公開ホストからは到達不可にする。ログイン画面ごとインターネットに晒さないため。
    location /api/ {
        return 403;
    }

    # ── QR画面だけ SPA を返す ──────────────────────────────
    location ~ ^/(driver|office)/[0-9]+/?$ {
        try_files /index.html =404;
    }

    # ── 静的アセット ───────────────────────────────────────
    # Service Worker（Web Push に必須）。キャッシュさせない。
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /sw.js =404;
    }
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }
    location = /favicon.svg   { try_files /favicon.svg =404; }
    location = /opengraph.jpg { try_files /opengraph.jpg =404; }

    # 管理画面は公開ホストには存在しない
    location / {
        return 404;
    }
}

# ─────────────────────────────────────────────────────────
# 管理ホスト: 全機能。Cloudflare Access（メール認証）で保護する前提。
# ─────────────────────────────────────────────────────────
server {
    listen 80;
    server_name admin.*;

    root /usr/share/nginx/html;
    resolver 127.0.0.11 valid=10s ipv6=off;
    client_max_body_size 2m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "same-origin" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location /api/ {
        include /etc/nginx/mikawa-proxy.conf;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /sw.js =404;
    }
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # SPA（wouter のクライアントルーティング）
    location / {
        try_files $uri /index.html;
    }
}
