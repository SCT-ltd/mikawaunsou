# /api を api-server へ渡す共通設定（location 内から include する）

proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
# Cloudflare が TLS を終端し、cloudflared → nginx は平文 HTTP で来る。
# 実際のクライアントは常に HTTPS なので https を固定で伝える。
# これが無いと Express が req.protocol を http と判断し、secure Cookie を発行できない。
proxy_set_header X-Forwarded-Proto https;
proxy_set_header Connection        "";

# SSE を2本使っている（GET /api/attendance/stream, GET /api/messages/stream）。
# バッファリング・圧縮・短いタイムアウトはいずれもイベントを止めるので必ず無効化する。
# ここを消すとリアルタイム地図と社内メッセージが「無言で」動かなくなる。
proxy_buffering    off;
proxy_cache        off;
gzip               off;
proxy_read_timeout 3600s;
proxy_send_timeout 3600s;

# api コンテナが再作成されて IP が変わっても追随できるよう、変数経由で毎回名前解決する
# （proxy_pass にリテラルを書くと nginx 起動時の IP を掴んだままになる）
set $mikawa_api http://api:8080;
proxy_pass $mikawa_api$request_uri;
