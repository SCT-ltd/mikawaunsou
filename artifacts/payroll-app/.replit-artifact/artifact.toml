kind = "web"
previewPath = "/"
title = "給与明細・バックオフィスシステム"
version = "1.0.0"
id = "artifacts/payroll-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21929

[services.development]
run = "pnpm --filter @workspace/payroll-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/payroll-app", "run", "build" ]
publicDir = "artifacts/payroll-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21929"
BASE_PATH = "/"
