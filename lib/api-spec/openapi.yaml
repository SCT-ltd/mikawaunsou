openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: 給与明細・バックオフィス効率化システム API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: employees
    description: 社員マスタ
  - name: company
    description: 会社マスタ
  - name: monthly-records
    description: 月次実績
  - name: payroll
    description: 給与計算・明細
  - name: journal-entries
    description: 振替伝票
  - name: dashboard
    description: ダッシュボード
  - name: allowance-definitions
    description: 手当マスタ
  - name: deduction-definitions
    description: 差引マスタ

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── 会社マスタ ──────────────────────────────────────────────────────────────
  /company:
    get:
      operationId: getCompany
      tags: [company]
      summary: 会社情報取得
      responses:
        "200":
          description: 会社情報
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "404":
          description: Not found
    put:
      operationId: updateCompany
      tags: [company]
      summary: 会社情報更新
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCompanyBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  # ── 社員マスタ ──────────────────────────────────────────────────────────────
  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: 社員一覧
      parameters:
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: 社員一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: 社員登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/{id}:
    get:
      operationId: getEmployee
      tags: [employees]
      summary: 社員詳細
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: 社員詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "404":
          description: Not found
    put:
      operationId: updateEmployee
      tags: [employees]
      summary: 社員更新
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    delete:
      operationId: deleteEmployee
      tags: [employees]
      summary: 社員削除（論理削除）
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  # ── 月次実績 ──────────────────────────────────────────────────────────────
  /monthly-records:
    get:
      operationId: listMonthlyRecords
      tags: [monthly-records]
      summary: 月次実績一覧
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
        - name: month
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 月次実績一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyRecord"
    post:
      operationId: createMonthlyRecord
      tags: [monthly-records]
      summary: 月次実績登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMonthlyRecordBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyRecord"

  /monthly-records/{id}:
    get:
      operationId: getMonthlyRecord
      tags: [monthly-records]
      summary: 月次実績詳細
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: 月次実績詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyRecord"
    put:
      operationId: updateMonthlyRecord
      tags: [monthly-records]
      summary: 月次実績更新
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMonthlyRecordBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyRecord"

  # ── 給与計算・明細 ──────────────────────────────────────────────────────────
  /payroll:
    get:
      operationId: listPayrolls
      tags: [payroll]
      summary: 給与一覧
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
        - name: month
          in: query
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, confirmed]
      responses:
        "200":
          description: 給与一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payroll"

  /payroll/calculate:
    post:
      operationId: calculatePayroll
      tags: [payroll]
      summary: 給与計算実行
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculatePayrollBody"
      responses:
        "200":
          description: 計算結果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payroll"

  /payroll/{id}:
    get:
      operationId: getPayroll
      tags: [payroll]
      summary: 給与明細詳細
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: 給与明細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payroll"
    put:
      operationId: updatePayroll
      tags: [payroll]
      summary: 給与明細更新
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePayrollBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payroll"

  /payroll/{id}/confirm:
    post:
      operationId: confirmPayroll
      tags: [payroll]
      summary: 給与確定
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payroll"

  /payroll/{id}/csv:
    get:
      operationId: exportPayrollCsv
      tags: [payroll]
      summary: 給与明細CSV出力
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: CSV data
          content:
            text/csv:
              schema:
                type: string

  # ── 振替伝票 ──────────────────────────────────────────────────────────────
  /journal-entries:
    get:
      operationId: listJournalEntries
      tags: [journal-entries]
      summary: 振替伝票一覧
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
        - name: month
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 振替伝票一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalEntry"

  /journal-entries/generate:
    post:
      operationId: generateJournalEntries
      tags: [journal-entries]
      summary: 振替伝票自動生成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateJournalEntriesBody"
      responses:
        "200":
          description: 生成された振替伝票
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalEntry"

  /journal-entries/export-csv:
    get:
      operationId: exportJournalEntriesCsv
      tags: [journal-entries]
      summary: 振替伝票CSV出力（会計ソフト連携）
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
        - name: month
          in: query
          required: true
          schema:
            type: integer
        - name: format
          in: query
          schema:
            type: string
            enum: [yayoi, freee, moneyforward, generic]
            default: generic
      responses:
        "200":
          description: CSV data
          content:
            text/csv:
              schema:
                type: string

  # ── ダッシュボード ──────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: ダッシュボードサマリー
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
        - name: month
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ダッシュボードサマリー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/monthly-trend:
    get:
      operationId: getMonthlyTrend
      tags: [dashboard]
      summary: 月別給与支払い推移（過去12ヶ月）
      responses:
        "200":
          description: 月別推移データ
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyTrendItem"

  /dashboard/pending-employees:
    get:
      operationId: getPendingEmployees
      tags: [dashboard]
      summary: 未確定社員一覧
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
        - name: month
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 未確定社員
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PendingEmployee"

  # ── 手当マスタ ──────────────────────────────────────────────────────────────
  /allowance-definitions:
    get:
      operationId: listAllowanceDefinitions
      tags: [allowance-definitions]
      summary: 手当定義一覧
      parameters:
        - name: activeOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: 手当定義一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AllowanceDefinition"
    post:
      operationId: createAllowanceDefinition
      tags: [allowance-definitions]
      summary: 手当定義追加
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAllowanceDefinitionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AllowanceDefinition"

  /allowance-definitions/{id}:
    put:
      operationId: updateAllowanceDefinition
      tags: [allowance-definitions]
      summary: 手当定義更新
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAllowanceDefinitionBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AllowanceDefinition"
    delete:
      operationId: deleteAllowanceDefinition
      tags: [allowance-definitions]
      summary: 手当定義削除（論理削除）
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  /employees/{id}/allowances:
    get:
      operationId: getEmployeeAllowances
      tags: [allowance-definitions]
      summary: 社員の手当金額一覧
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: 社員手当一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeAllowance"
    put:
      operationId: updateEmployeeAllowances
      tags: [allowance-definitions]
      summary: 社員の手当金額一括更新
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeAllowancesBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeAllowance"

  # ── 差引マスタ ──────────────────────────────────────────────────────────────
  /deduction-definitions:
    get:
      operationId: listDeductionDefinitions
      tags: [deduction-definitions]
      summary: 差引定義一覧
      parameters:
        - name: activeOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: 差引定義一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeductionDefinition"
    post:
      operationId: createDeductionDefinition
      tags: [deduction-definitions]
      summary: 差引定義追加
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeductionDefinitionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeductionDefinition"

  /deduction-definitions/{id}:
    put:
      operationId: updateDeductionDefinition
      tags: [deduction-definitions]
      summary: 差引定義更新
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDeductionDefinitionBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeductionDefinition"
    delete:
      operationId: deleteDeductionDefinition
      tags: [deduction-definitions]
      summary: 差引定義削除（論理削除）
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  /employees/{id}/deductions:
    get:
      operationId: getEmployeeDeductions
      tags: [deduction-definitions]
      summary: 社員の差引金額一覧
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: 社員差引一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeDeduction"
    put:
      operationId: updateEmployeeDeductions
      tags: [deduction-definitions]
      summary: 社員の差引金額一括更新
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeDeductionsBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeDeduction"

# ── コンポーネント ────────────────────────────────────────────────────────────
components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Company:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        closingDay:
          type: integer
          description: 締め日（例：31は月末）
        paymentDay:
          type: integer
          description: 支払日
        monthlyAverageWorkHours:
          type: number
          description: 月平均労働時間（時間外計算の基準）
        socialInsuranceRate:
          type: number
          description: 社会保険料率（健康保険＋厚生年金）従業員負担分合計
        employmentInsuranceRate:
          type: number
          description: 雇用保険料率 従業員負担分
        healthInsuranceEmployeeRate:
          type: number
          description: 健康保険料率（本人負担）
        healthInsuranceEmployerRate:
          type: number
          description: 健康保険料率（会社負担）
        careInsuranceRate:
          type: number
          description: 介護保険料率（本人負担折半分、40〜64歳対象者に適用）
        pensionEmployeeRate:
          type: number
          description: 厚生年金保険料率（本人負担）
        pensionEmployerRate:
          type: number
          description: 厚生年金保険料率（会社負担）
        employmentInsuranceEmployerRate:
          type: number
          description: 雇用保険料率（会社負担）
        overtimeRate:
          type: number
          description: 残業割増率（例：1.25）
        lateNightAdditionalRate:
          type: number
          description: 深夜追加割増率（例：0.25）
        holidayRate:
          type: number
          description: 休日出勤割増率（例：1.35）
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - closingDay
        - paymentDay
        - monthlyAverageWorkHours
        - socialInsuranceRate
        - employmentInsuranceRate
        - healthInsuranceEmployeeRate
        - healthInsuranceEmployerRate
        - careInsuranceRate
        - pensionEmployeeRate
        - pensionEmployerRate
        - employmentInsuranceEmployerRate
        - overtimeRate
        - lateNightAdditionalRate
        - holidayRate
        - createdAt
        - updatedAt

    UpdateCompanyBody:
      type: object
      properties:
        name:
          type: string
        closingDay:
          type: integer
        paymentDay:
          type: integer
        monthlyAverageWorkHours:
          type: number
        socialInsuranceRate:
          type: number
        employmentInsuranceRate:
          type: number
        healthInsuranceEmployeeRate:
          type: number
        healthInsuranceEmployerRate:
          type: number
        careInsuranceRate:
          type: number
          description: 介護保険料率（本人負担折半分、40〜64歳対象者に適用）
        pensionEmployeeRate:
          type: number
        pensionEmployerRate:
          type: number
        employmentInsuranceEmployerRate:
          type: number
        overtimeRate:
          type: number
        lateNightAdditionalRate:
          type: number
        holidayRate:
          type: number

    Employee:
      type: object
      properties:
        id:
          type: integer
        employeeCode:
          type: string
          description: 社員番号
        name:
          type: string
        nameKana:
          type: string
        department:
          type: string
          description: 部署
        position:
          type: string
          description: 役職
        baseSalary:
          type: number
          description: 基本給（円）
        transportationAllowance:
          type: number
          description: 通勤手当
        safetyDrivingAllowance:
          type: number
          description: 無事故手当
        longDistanceAllowance:
          type: number
          description: 長距離手当
        positionAllowance:
          type: number
          description: 役職手当
        familyAllowance:
          type: number
          description: 家族手当
        earlyOvertimeAllowance:
          type: number
          description: 早出残業手当
        commissionRatePerKm:
          type: number
          description: 歩合単価（円/km）
        commissionRatePerCase:
          type: number
          description: 歩合単価（円/件）
        dependentCount:
          type: integer
          description: 扶養親族数
        hasSpouse:
          type: boolean
          description: 配偶者の有無
        standardRemuneration:
          type: number
          description: 標準報酬月額（9月定時決定で確定、翌8月まで固定）
        careInsuranceApplied:
          type: boolean
          description: 介護保険適用（40〜64歳対象）
        healthInsuranceMonthly:
          type: number
          description: 健康保険料（月額）固定額
        pensionMonthly:
          type: number
          description: 厚生年金保険料（月額）固定額
        employmentInsuranceApplied:
          type: boolean
          description: 雇用保険適用
        residentTax:
          type: number
          description: 住民税（月額）
        salaryType:
          type: string
          description: 給与形態（fixed=固定給, daily=日給制）
          enum: [fixed, daily]
        hireDate:
          type: string
          format: date
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - employeeCode
        - name
        - nameKana
        - department
        - baseSalary
        - transportationAllowance
        - safetyDrivingAllowance
        - longDistanceAllowance
        - positionAllowance
        - familyAllowance
        - earlyOvertimeAllowance
        - commissionRatePerKm
        - commissionRatePerCase
        - dependentCount
        - hasSpouse
        - standardRemuneration
        - careInsuranceApplied
        - healthInsuranceMonthly
        - pensionMonthly
        - employmentInsuranceApplied
        - residentTax
        - salaryType
        - hireDate
        - isActive
        - createdAt
        - updatedAt

    CreateEmployeeBody:
      type: object
      properties:
        employeeCode:
          type: string
        name:
          type: string
        nameKana:
          type: string
        department:
          type: string
        position:
          type: string
        baseSalary:
          type: number
        transportationAllowance:
          type: number
        safetyDrivingAllowance:
          type: number
        longDistanceAllowance:
          type: number
        positionAllowance:
          type: number
        familyAllowance:
          type: number
        earlyOvertimeAllowance:
          type: number
        commissionRatePerKm:
          type: number
        commissionRatePerCase:
          type: number
        dependentCount:
          type: integer
        residentTax:
          type: number
        hireDate:
          type: string
          format: date
      required:
        - employeeCode
        - name
        - nameKana
